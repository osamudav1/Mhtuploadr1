kind = "web"
previewPath = "/"
title = "MHT Bot"
version = "1.0.0"
id = "artifacts/bot-status"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22053

[services.development]
run = "pnpm --filter @workspace/bot-status run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-status", "run", "build" ]
publicDir = "artifacts/bot-status/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22053"
BASE_PATH = "/"
